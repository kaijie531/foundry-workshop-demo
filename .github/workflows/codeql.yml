# =============================================================================
# Code scanning with CodeQL  (DevSecOps — SAST)   owner: @security-reviewer
# -----------------------------------------------------------------------------
# This is the code-scanning plug-in point. Uncomment the language(s) your repo
# uses in the matrix below. Findings appear under Security ▸ Code scanning and
# can block PRs when wired into a branch-protection ruleset.
# =============================================================================
name: CodeQL

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'   # weekly baseline scan (Mondays 03:00 UTC)

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload CodeQL results
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Languages CodeQL should analyze. This demo ships a Python app.
        # Supported: c-cpp, csharp, go, java-kotlin, javascript-typescript,
        #            python, ruby, swift
        language: [ python ]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      # For compiled languages, replace autobuild with your real build command.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
