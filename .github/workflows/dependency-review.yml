# =============================================================================
# Dependency review  (DevSecOps — SCA on pull requests)   owner: @security-reviewer
# -----------------------------------------------------------------------------
# Blocks PRs that introduce dependencies with known vulnerabilities or
# disallowed licenses. Works out of the box on public repos; requires GitHub
# Advanced Security on private repos.
# Agent note: tune `fail-on-severity` and the license policy below.
# =============================================================================
name: Dependency review

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # PLACEHOLDER — restrict licenses if required, e.g.:
          # deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: on-failure
